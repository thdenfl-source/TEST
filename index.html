<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUH-1CG CDU - Advanced PERF & External Links</title>
    <style>
        :root {
            --bg-dark: #050505;
            --text-green: #c8ff00; 
            --text-cyan: #00ffff;
            --active-blue: #87ceeb;
            --btn-grad: linear-gradient(to bottom, #444, #111, #000);
            --border-3d: 1px solid #444;
        }

        body { 
            background-color: #222;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; font-family: 'Arial', sans-serif; color: white; 
            user-select: none; touch-action: manipulation;
            padding: 30px 0;
            overflow: auto; 
        }

        .cdu-frame { 
            width: 354px;
            height: 567px; 
            background-color: #111; padding: 8px; border-radius: 12px; border: 3px solid #000; 
            display: flex; flex-direction: column;
            box-shadow: 0 13px 33px rgba(0,0,0,0.9);
            transform-origin: center; 
            flex-shrink: 0;
        }
        
        .touch-display { background-color: var(--bg-dark);
            flex: 1; display: flex; flex-direction: column; border: 1.5px solid #000; overflow: hidden;
        }

        /* Header (CNS Bar) */
        .header-grid { display: grid;
            grid-template-columns: 0.9fr 1.2fr 0.8fr 1.2fr 0.8fr; background: #111; padding: 4px; gap: 3px; border-bottom: 1.5px solid #333; height: 63px;
        }
        .header-box { background: #0a0a0a; border: 0.7px solid #444; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .header-label { font-size: 6px; color: #888; text-align: center; width: 100%; pointer-events: none; }
        .freq-act { color: white; font-size: 11px; font-weight: bold; }
        .freq-stby { color: var(--text-cyan); font-size: 10px; font-weight: bold; }
        .swap-arrow { font-size: 10px; color: #777; cursor: pointer; padding: 2px; z-index: 10;}
        .green-ind { color: var(--text-green); font-size: 8px; font-weight: bold; text-align: center; line-height: 1.1; }

        /* --- 기능 활성화 버튼 시각적 강조 스타일 --- */
        .func-active {
            background: linear-gradient(to bottom, rgba(135, 206, 235, 0.25) 0%, #444 40%, #1a1a1a 100%) !important;
            border-top: 1px solid rgba(135, 206, 235, 0.6) !important;
            transition: background 0.1s ease;
        }
        .func-active:active {
            background: linear-gradient(to bottom, rgba(135, 206, 235, 0.4) 0%, #555 40%, #222 100%) !important;
        }
        .top-func-btn {
            background: linear-gradient(to bottom, rgba(135, 206, 235, 0.2) 0%, transparent 80%);
            transition: background 0.1s ease;
        }
        .top-func-btn:active {
            background: rgba(135, 206, 235, 0.35);
        }

        /* Titles and Sub-headers */
        .mode-title-bar { background: linear-gradient(to bottom, #555, #111);
            text-align: center; padding: 3px; font-size: 9px; font-weight: bold; border-bottom: 1px solid #000; color: #eee;
        }
        .sub-header { display: flex; align-items: flex-end; padding: 4px 7px 0 7px;
            gap: 5px; background: #1a1a1a; }
        .user-3d-btn { height: 37px; background: var(--btn-grad);
            border: var(--border-3d); border-radius: 4px 4px 0 0; font-size: 7px; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 5px;
        }
        
        .tab-container { display: flex; flex: 1; gap: 3px; }
        .tab { flex: 1; height: 30px; background: #2c2c2c; border: 0.7px solid #444;
            border-radius: 4px 4px 0 0; display: flex; align-items: center; justify-content: center; font-size: 7px; cursor: pointer; color: #aaa;
        }
        .tab.active { background: #eee; color: black; font-weight: bold; height: 32px; margin-top: -2px; }

        /* Main Content */
        #mainContentArea { flex: 1; display: flex; flex-direction: column; padding: 7px; overflow-y: auto; }
        .panel-border { flex: 1; border: 1.5px solid var(--active-blue); border-radius: 5px; padding: 8px; background: black; display: flex; flex-direction: column; }

        /* Common Buttons */
        .item-btn { height: 35px; background: var(--btn-grad); border: var(--border-3d);
            color: white; font-size: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; border-radius: 4px; position: relative; text-align: center;
        }
        .status-line { position: absolute; bottom: 3px; width: 70%; height: 2px; background: #333; border-radius: 1.5px; }
        .on .status-line { background: var(--text-green); box-shadow: 0 0 3px var(--text-green); }

        /* Sliders */
        .volume-row { display: grid; grid-template-columns: 50px 43px 1fr 63px; align-items: center; margin-bottom: 7px; gap: 5px; }
        .wedge-slider { height: 28px; background: #111; border: 0.7px solid #444; position: relative; overflow: hidden; cursor: ew-resize; border-radius: 3px; }
        .wedge-fill { height: 100%; background: linear-gradient(to right, #1a3a4a, #00d2ff); clip-path: polygon(0% 100%, 100% 0%, 100% 100%); pointer-events: none; }
        .wedge-text { position: absolute; left: 7px; top: 8px; font-size: 8px; color: var(--active-blue); font-weight: bold; z-index: 3; pointer-events: none; }

        /* Audio Radios */
        .freq-display-box { height: 35px; background: #0a0a0a; border: 0.7px solid #444; display: flex; flex-direction: column; justify-content: center; align-items: flex-end; padding-right: 5px; border-radius: 4px; cursor: pointer; }

        /* Intercom Grid */
        .intercom-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 5px; }
        .loop-row { display: flex; gap: 8px; margin-top: 10px; }

        /* Numpad */
        .input-row { display: flex; align-items: center; justify-content: center; gap: 7px; margin: 10px 0 20px 0; }
        .freq-box-main { width: 120px; height: 40px; background: #000; border: 1.5px solid #555; border-radius: 4px; color: var(--text-green); font-size: 22px; display: flex; align-items: center; justify-content: center; font-family: monospace; }
        .numpad-grid { display: grid; grid-template-columns: repeat(3, 60px); gap: 10px; justify-content: center; }
        .xpdr-numpad-grid { display: grid; grid-template-columns: repeat(4, 55px); gap: 10px; justify-content: center; margin-bottom: 15px;}
        .selcal-grid { display: grid; grid-template-columns: repeat(5, 45px); gap: 8px; justify-content: center; }
        .num-circle { width: 50px; height: 50px; background: radial-gradient(circle at 30% 30%, #444, #111); border: 0.7px solid #555; border-radius: 50%; color: white; font-size: 18px; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 3px 5px rgba(0,0,0,0.6); }

        /* Footer */
        .footer-nav { height: 53px; display: flex; justify-content: space-around; align-items: center; background: #111; border-top: 1.5px solid #333; padding: 0 5px; }
        .nav-btn { background: var(--btn-grad); border: var(--border-3d); border-radius: 5px; padding: 6px; min-width: 45px; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; font-size: 7px; color: white; }
        .nav-btn span { font-size: 14px; pointer-events: none; }
        .enter-btn-blue { background: #1a2a4a; border: 1px solid var(--active-blue); }

        .status-footer { height: 25px; background: #111; display: grid; grid-template-columns: 1fr 1.5fr 1fr; border-top: 0.7px solid #333; font-size: 6px; color: #ccc; align-items: center; padding: 0 7px; text-align: center; }
        
        /* Home Grid */
        .home-grid { display: flex; flex-wrap: wrap; justify-content: center; align-items: flex-start; gap: 15px 5px; padding: 5px; }
        .home-icon-wrapper { width: 23%; display: flex; flex-direction: column; align-items: center; cursor: pointer; text-decoration: none; color: inherit; }
        .icon-box { width: 45px; height: 45px; background: linear-gradient(to bottom, #444, #1a1a1a); border-radius: 8px; border: 1px solid #555; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.6); }
        .icon-box svg { width: 70%; height: 70%; }
        .icon-label { font-size: 8px; color: #eee; text-align: center; font-weight: bold; line-height: 1.1; pointer-events: none; }
        
        /* PERF Page Styles */
        .perf-row { display: flex; justify-content: space-between; margin-bottom: 12px; align-items: center; }
        .perf-label { font-size: 9px; color: #ccc; margin-bottom: 3px; }
        .perf-val-box { border: 1px solid var(--active-blue); background: #000; padding: 5px 10px; border-radius: 4px; color: var(--text-green); font-size: 14px; font-weight: bold; min-width: 60px; text-align: center; cursor: pointer; }
        .perf-result-box { background: #1a1a1a; border: 1px solid #555; padding: 3px 5px; border-radius: 4px; color: white; font-size: 12px; font-weight: bold; min-width: 50px; text-align: center; display: flex; align-items: center; justify-content: center; }
        .perf-result-title { font-size: 7px; color: var(--text-cyan); text-align: center; margin-bottom: 2px; }
    </style>
</head>

        let targetScale = 1.37;
        let maxWidth = screenWidth * 0.92; 
        
        if (baseWidth * targetScale > maxWidth) {
            targetScale = maxWidth / baseWidth;
        }
        
        frame.style.transform = `scale(${targetScale})`;

    let perfResults = { oge: "0.0", ige: "0.0", oge_gonogo: "0.0", ige_gonogo: "0.0", mta30: "0.0", mta10: "0.0", mta25: "0.0" };

    const igeOgeMap = [

    ];

    const oge19200_data = [

    const mta30_data = [

        [82,83,83,83,83,84,84,84,84,85,85,85,85,85,86,86,87,86,85,84,83,82,81,80,79,78,77,75,74,73,71,71,69,68],
        [79,79,80,80,80,80,81,81,81,81,81,82,82,82,83,83,83,82,81,80,79,79,78,77,76,75,74,72,71,70,69,67,66],
        [76,76,76,76,77,77,77,77,78,78,78,78,79,79,79,79,79,79,78,77,76,75,74,73,72,71,70,69,68,66,66,65]
    ];

    function interpolate1D(x, x0, x1, y0, y1) {
        if (x1 === x0) return y0;
        return y0 + (x - x0) * (y1 - y0) / (x1 - x0);
    }

    function getOgeVal(dataArray, altIdx, tempIdx) {
        let a0 = Math.floor(altIdx); let a1 = Math.ceil(altIdx);
        let t0 = Math.floor(tempIdx); let t1 = Math.ceil(tempIdx);
        let aFrac = altIdx - a0; let tFrac = tempIdx - t0;

        let val00 = dataArray[a0][t0]; let val01 = dataArray[a0][t1];
        let val10 = dataArray[a1][t0]; let val11 = dataArray[a1][t1];

        let val0 = interpolate1D(tFrac, 0, 1, val00, val01);
        let val1 = interpolate1D(tFrac, 0, 1, val10, val11);
        return interpolate1D(aFrac, 0, 1, val0, val1);
    }

    function calculatePerformance() {
        let alt = parseFloat(perfData.alt) || 0;
        let temp = parseFloat(perfData.temp) || 0;
        let wt = parseFloat(perfData.weight) || 16000;

        let cAlt = Math.max(0, Math.min(14000, alt));
        let cTemp = Math.max(-34, Math.min(40, temp));

        let altIdx = cAlt / 1000;
        let alt0 = Math.floor(altIdx);
        let alt1 = Math.ceil(altIdx);
        let altFrac = altIdx - alt0;

        let tempIdx = (cTemp + 34) / 2;
        let temp0 = Math.floor(tempIdx);
        let temp1 = Math.ceil(tempIdx);
        let tempFrac = tempIdx - temp0;

        function getMtaVal(r, c) {
            if(r >= mta30_data.length || c >= mta30_data[r].length) return null;
            return mta30_data[r][c];
        }

        let mta00 = getMtaVal(alt0, temp0); let mta01 = getMtaVal(alt0, temp1);
        let mta10 = getMtaVal(alt1, temp0); let mta11 = getMtaVal(alt1, temp1);

        if (mta00 && mta01 && mta10 && mta11) {
            let mta0 = interpolate1D(tempFrac, 0, 1, mta00, mta01);
            let mta1 = interpolate1D(tempFrac, 0, 1, mta10, mta11);
            let mta30 = interpolate1D(altFrac, 0, 1, mta0, mta1);

            perfResults.mta30 = mta30.toFixed(1);
            perfResults.mta10 = (mta30 + 7).toFixed(1); 
            perfResults.mta25 = (mta30 + 11).toFixed(1); 
        } else {
            perfResults.mta30 = "N/A"; perfResults.mta10 = "N/A"; perfResults.mta25 = "N/A";
        }

        let oAltIdx = Math.max(0, Math.min(6, cAlt / 1000));
        let oTempIdx = Math.max(0, Math.min(9, (cTemp - (-10)) / 5));

        let oge16k = getOgeVal(oge16000_data, oAltIdx, oTempIdx);
        let oge19k = getOgeVal(oge19200_data, oAltIdx, oTempIdx);

        let w_factor = (wt - 16000) / (19200 - 16000);
        let finalOGE = interpolate1D(w_factor, 0, 1, oge16k, oge19k);

        perfResults.oge = finalOGE.toFixed(1);
        perfResults.oge_gonogo = oge19k.toFixed(1); 

        function getIGEfromOGE(targetOGE) {
            let ige = 0;
            for (let i = 0; i < igeOgeMap.length - 1; i++) {
                if (targetOGE >= igeOgeMap[i][0] && targetOGE <= igeOgeMap[i+1][0]) {
                    ige = interpolate1D(targetOGE, igeOgeMap[i][0], igeOgeMap[i+1][0], igeOgeMap[i][1], igeOgeMap[i+1][1]);
                    break;
                }
            }
            if (targetOGE < igeOgeMap[0][0]) ige = igeOgeMap[0][1] - (igeOgeMap[0][0] - targetOGE); 
            if (targetOGE > igeOgeMap[igeOgeMap.length-1][0]) ige = igeOgeMap[igeOgeMap.length-1][1] + (targetOGE - igeOgeMap[igeOgeMap.length-1][0]);
            return ige;
        }

        perfResults.ige = getIGEfromOGE(finalOGE).toFixed(1);
        perfResults.ige_gonogo = getIGEfromOGE(oge19k).toFixed(1);
    }

    // --- Control Logics ---
    function toggleHfTuning() { hfState.tuning = hfState.tuning === 'Simplex' ? 'Duplex' : 'Simplex'; renderContent(); }
    function toggleHfEmission() {
        const modes = ['LSB V', 'USB V', 'AM'];
        hfState.emission = modes[(modes.indexOf(hfState.emission) + 1) % modes.length]; renderContent();
    }
    function toggleHfSql() {
        const sqls = ['SQ0', 'SQ1', 'SQ2', 'SQ3'];
        hfState.sql = sqls[(sqls.indexOf(hfState.sql) + 1) % sqls.length]; renderContent();
    }
    function toggleHfPwr() {
        const pwrs = ['Low', 'Mid', 'High'];
        hfState.pwr = pwrs[(pwrs.indexOf(hfState.pwr) + 1) % pwrs.length]; renderContent();
    }

    function setXpdrMode(m) { xpdrState.mode = m; renderContent(); }
    function toggleAdsb() { xpdrState.adsb = !xpdrState.adsb; renderContent(); }
    
    function addXpdrInput(num) {
        if (!hasStartedTyping) { xpdrInput = num; hasStartedTyping = true; }
        else if (xpdrInput.length < 4) { xpdrInput += num; }
        renderContent();
    }
    function backspaceXpdr() {
        if (!hasStartedTyping) { hasStartedTyping = true; }
        xpdrInput = xpdrInput.slice(0, -1); renderContent();
    }
    function setXpdrPreset(code) { xpdrInput = code; hasStartedTyping = true; renderContent(); }
    function flashIdent() { renderContent(); }
    function confirmXpdr() {
        if(hasStartedTyping && xpdrInput.length === 4) { xpdrState.code = xpdrInput; }
        switchMode('XPDR_MODE');
    }

    function toggleIsolate() {
        icStates.Isolate = !icStates.Isolate;
        if (icStates.Isolate) {
            icStates.CoPilot = true; icStates.Pilot = true;
            icStates.Crew1 = false; icStates.Pass = false; icStates.Crew2 = false; icStates.wICS = false;
            icStates.Loop1 = false; icStates.Loop2 = false; icStates.Loop5 = false;
        }
        renderContent();
    }

    function toggleIC(name) { 
        icStates[name] = !icStates[name]; 
        if (name === 'Loop1' && icStates.Loop1) { icStates.Crew1 = true; icStates.Crew2 = true; icStates.Isolate = false; } 
        else if (name === 'Loop2' && icStates.Loop2) { icStates.Pass = true; icStates.Isolate = false; } 
        else if (name === 'Loop5' && icStates.Loop5) {
            icStates.CoPilot = true; icStates.Pilot = true; icStates.Crew1 = true;
            icStates.Pass = true; icStates.Crew2 = true; icStates.wICS = true;
            icStates.Isolate = false;
        }
        if (['Crew1', 'Pass', 'Crew2', 'wICS'].includes(name) && icStates[name]) { icStates.Isolate = false; }
        renderContent(); 
    }

    function setMic(label) { 
        if (micSelected === label) { micSelected = 'OFF'; } else { micSelected = label; }
        renderContent(); 
    }
    function toggleMon(id) { monStates[id] = !monStates[id]; renderContent(); }

    function updateHeaderUI() {
        const topMic = document.getElementById('top-mic-val');
        if(topMic) {
            if (micSelected === 'OFF' || !micSelected) { topMic.innerText = ''; } 
            else { topMic.innerText = micSelected; }
        }
        
        let monArr = [];
        if(monStates.com1) monArr.push("1"); 
        if(monStates.com2) monArr.push("2"); 
        if(monStates.uvhf) monArr.push("M");
        let monText = monArr.length ? monArr.join('/') : 'OFF';
        if(monStates.vhffm && audioTab === 'Mission') { monText = "VHF-FM"; }

        const topMon = document.getElementById('top-mon-val');
        if(topMon) topMon.innerText = monText;

        if(document.getElementById('h-com1-act')){
            document.getElementById('h-com1-act').innerText = freqs.com1.act;
            document.getElementById('h-com1-stb').innerText = freqs.com1.stb;
            document.getElementById('h-com2-act').innerText = freqs.com2.act;
            document.getElementById('h-com2-stb').innerText = freqs.com2.stb;
        }

        const xpdrModeElem = document.getElementById('top-xpdr-mode');
        if(xpdrModeElem) {
            let shortMode = xpdrState.mode.toUpperCase();
            if(shortMode === 'ALTITUDE REPORTING') shortMode = 'ALT';
            if(shortMode === 'TA ONLY') shortMode = 'TA';
            xpdrModeElem.innerText = shortMode;
        }
        const xpdrCodeElem = document.getElementById('top-xpdr-code');
        if(xpdrCodeElem) xpdrCodeElem.innerText = xpdrState.code;
    }

    function handleVol(id, e) {
        const s = e.currentTarget;
        s.setPointerCapture(e.pointerId);
        const update = (pe) => {
            const r = s.getBoundingClientRect();
            volumes[id] = Math.round(Math.max(0, Math.min(100, (pe.clientX - r.left) / r.width * 100)));
            s.querySelector('.wedge-fill').style.width = volumes[id] + '%';
            if(s.querySelector('.wedge-text')) s.querySelector('.wedge-text').innerText = volumes[id] + '%';
        };
        update(e); s.onpointermove = update; s.onpointerup = () => s.onpointermove = null;
    }

    function swapFreq(id) { 
        if(!freqs[id]) return;
        [freqs[id].act, freqs[id].stb] = [freqs[id].stb, freqs[id].act];
        renderContent();
    }

    // --- Input Handling Logic ---
    function addInput(num) {
        if (!hasStartedTyping) {
            currentInput = num;
            hasStartedTyping = true;
        } else if (currentMode === 'PERF_INPUT') {
            if (num === '-' && currentInput.length > 0) return;
            if (currentInput.length < 6) currentInput += num;
        } else if (currentInput.length < 7) {
            currentInput += num;
        }
        renderContent();
    }

    function backspaceInput() {
        if (!hasStartedTyping) {
            hasStartedTyping = true;
            if(currentMode === 'PERF_INPUT') currentInput = perfData[inputTarget].toString();
        }
        currentInput = currentInput.slice(0, -1);
        renderContent();
    }

    function confirmPerfInput() { 
        if (hasStartedTyping && currentInput !== "" && currentInput !== "-") {
            perfData[inputTarget] = currentInput;
        }
        switchMode('PERF');
    }

    // --- SELCAL Input Logic ---
    function addSelcalInput(char) {
        if (!hasStartedTyping) {
            selcalInput = "";
            hasStartedTyping = true;
        }
        if (selcalInput.length >= 4) return;
        if (selcalInput.includes(char)) return; 

        if (selcalInput.length === 1 && char <= selcalInput[0]) return;
        if (selcalInput.length === 3 && char <= selcalInput[2]) return;

        selcalInput += char;
        renderContent();
    }

    function backspaceSelcal() {
        if (!hasStartedTyping) {
            hasStartedTyping = true;
            selcalInput = selcalCode;
        }
        selcalInput = selcalInput.slice(0, -1);
        renderContent();
    }

    function confirmSelcal() {
        if (hasStartedTyping && selcalInput.length === 4) {
            selcalCode = selcalInput;
        }
        switchMode('AUDIO');
        switchAudioTab('Mission');
    }

    function saveInputAndReturn() {
        if (hasStartedTyping && currentInput.length >= 3) {
            let v = currentInput;
            if (inputTarget === 'hf') {
                if (!v.includes('.') && v.length > 2) v = v.slice(0, 2) + "." + v.slice(2);
            } else {
                if (!v.includes('.') && v.length > 3) v = v.slice(0, 3) + "." + v.slice(3);
            }
            freqs[inputTarget].stb = v;
        }
        let backMode = inputTarget === 'hf' ? 'HF_CONTROL' : 'AUDIO';
        switchMode(backMode, inputTarget);
    }

    function handleInputXfer() {
        saveInputAndReturn();
        swapFreq(inputTarget);
    }

    function confirmInput() { 
        saveInputAndReturn();
    }

    // 초기 화면 크기 자동 조절 연동
    window.addEventListener('resize', adjustScale);
    function adjustScale() {
        const frame = document.querySelector('.cdu-frame');
        const screenWidth = window.innerWidth;
        const baseWidth = 370; 
        
        let targetScale = 1.37;
        let maxWidth = screenWidth * 0.92; 
        
        if (baseWidth * targetScale > maxWidth) {
            targetScale = maxWidth / baseWidth;
        }
        
        frame.style.transform = `scale(${targetScale})`;
    }

    window.onload = () => {
        adjustScale();
        switchMode('HOME'); 
    };
</script>
</body>
</html>
