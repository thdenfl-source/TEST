<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUH-1CG CDU - Scaled Up (1.37x) & Smart Input Logic</title>
    <style>
        :root {
            --bg-dark: #050505;
            --text-green: #c8ff00; 
            --text-cyan: #00ffff;
            --active-blue: #87ceeb;
            --btn-grad: linear-gradient(to bottom, #444, #111, #000);
            --border-3d: 1px solid #444;
        }

        body { 
            background-color: #222;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; font-family: 'Arial', sans-serif; color: white; 
            user-select: none; touch-action: manipulation;
            padding: 30px 0;
            overflow: auto; 
        }

        .cdu-frame { 
            width: 354px;
            height: 567px; 
            background-color: #111; padding: 8px; border-radius: 12px; border: 3px solid #000; 
            display: flex; flex-direction: column;
            box-shadow: 0 13px 33px rgba(0,0,0,0.9);
            transform: scale(1.37);
            transform-origin: center; 
            flex-shrink: 0;
        }
        
        .touch-display { background-color: var(--bg-dark);
            flex: 1; display: flex; flex-direction: column; border: 1.5px solid #000; overflow: hidden;
        }

        /* Header (CNS Bar) */
        .header-grid { display: grid;
            grid-template-columns: 0.9fr 1.2fr 0.8fr 1.2fr 0.8fr; background: #111; padding: 4px; gap: 3px; border-bottom: 1.5px solid #333; height: 63px;
        }
        .header-box { background: #0a0a0a; border: 0.7px solid #444; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .header-label { font-size: 6px; color: #888; text-align: center; width: 100%; pointer-events: none; }
        .freq-act { color: white; font-size: 11px; font-weight: bold; }
        .freq-stby { color: var(--text-cyan); font-size: 10px; font-weight: bold; }
        .swap-arrow { font-size: 10px; color: #777; cursor: pointer; padding: 2px; z-index: 10;}
        .green-ind { color: var(--text-green); font-size: 8px; font-weight: bold; text-align: center; line-height: 1.1; }

        /* Titles and Sub-headers */
        .mode-title-bar { background: linear-gradient(to bottom, #555, #111);
            text-align: center; padding: 3px; font-size: 9px; font-weight: bold; border-bottom: 1px solid #000; color: #eee;
        }
        .sub-header { display: flex; align-items: flex-end; padding: 4px 7px 0 7px;
            gap: 5px; background: #1a1a1a; }
        .user-3d-btn { height: 37px; background: var(--btn-grad);
            border: var(--border-3d); border-radius: 4px 4px 0 0; font-size: 7px; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 5px;
        }
        
        .tab-container { display: flex; flex: 1; gap: 3px; }
        .tab { flex: 1; height: 30px; background: #2c2c2c; border: 0.7px solid #444;
            border-radius: 4px 4px 0 0; display: flex; align-items: center; justify-content: center; font-size: 7px; cursor: pointer; color: #aaa;
        }
        .tab.active { background: #eee; color: black; font-weight: bold; height: 32px; margin-top: -2px; }

        /* Main Content */
        #mainContentArea { flex: 1; display: flex; flex-direction: column; padding: 7px; overflow-y: auto; }
        .panel-border { flex: 1; border: 1.5px solid var(--active-blue); border-radius: 5px; padding: 8px; background: black; display: flex; flex-direction: column; }

        /* Common Buttons */
        .item-btn { height: 35px; background: var(--btn-grad); border: var(--border-3d);
            color: white; font-size: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; border-radius: 4px; position: relative; text-align: center;
        }
        .status-line { position: absolute; bottom: 3px; width: 70%; height: 2px; background: #333; border-radius: 1.5px; }
        .on .status-line { background: var(--text-green); box-shadow: 0 0 3px var(--text-green); }

        /* Sliders */
        .volume-row { display: grid; grid-template-columns: 50px 43px 1fr 63px; align-items: center; margin-bottom: 7px; gap: 5px; }
        .wedge-slider { height: 28px; background: #111; border: 0.7px solid #444; position: relative; overflow: hidden; cursor: ew-resize; border-radius: 3px; }
        .wedge-fill { height: 100%; background: linear-gradient(to right, #1a3a4a, #00d2ff); clip-path: polygon(0% 100%, 100% 0%, 100% 100%); pointer-events: none; }
        .wedge-text { position: absolute; left: 7px; top: 8px; font-size: 8px; color: var(--active-blue); font-weight: bold; z-index: 3; pointer-events: none; }

        /* Audio Radios */
        .freq-display-box { height: 35px; background: #0a0a0a; border: 0.7px solid #444; display: flex; flex-direction: column; justify-content: center; align-items: flex-end; padding-right: 5px; border-radius: 4px; cursor: pointer; }

        /* Intercom Grid */
        .intercom-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 5px; }
        .loop-row { display: flex; gap: 8px; margin-top: 10px; }

        /* Numpad */
        .input-row { display: flex; align-items: center; justify-content: center; gap: 7px; margin: 10px 0 20px 0; }
        .freq-box-main { width: 120px; height: 40px; background: #000; border: 1.5px solid #555; border-radius: 4px; color: var(--text-green); font-size: 22px; display: flex; align-items: center; justify-content: center; font-family: monospace; }
        .numpad-grid { display: grid; grid-template-columns: repeat(3, 60px); gap: 10px; justify-content: center; }
        .xpdr-numpad-grid { display: grid; grid-template-columns: repeat(4, 55px); gap: 10px; justify-content: center; margin-bottom: 15px;}
        .num-circle { width: 50px; height: 50px; background: radial-gradient(circle at 30% 30%, #444, #111); border: 0.7px solid #555; border-radius: 50%; color: white; font-size: 18px; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 3px 5px rgba(0,0,0,0.6); }

        /* Footer */
        .footer-nav { height: 53px; display: flex; justify-content: space-around; align-items: center; background: #111; border-top: 1.5px solid #333; padding: 0 5px; }
        .nav-btn { background: var(--btn-grad); border: var(--border-3d); border-radius: 5px; padding: 6px; min-width: 45px; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; font-size: 7px; color: white; }
        .nav-btn span { font-size: 14px; pointer-events: none; }
        .enter-btn-blue { background: #1a2a4a; border: 1px solid var(--active-blue); }

        .status-footer { height: 25px; background: #111; display: grid; grid-template-columns: 1fr 1.5fr 1fr; border-top: 0.7px solid #333; font-size: 6px; color: #ccc; align-items: center; padding: 0 7px; text-align: center; }
        
        /* 4-Column Home Grid (Flex-wrap for 4-4-4-3 layout) */
        .home-grid { 
            display: flex; flex-wrap: wrap; justify-content: center; align-items: flex-start;
            gap: 15px 5px; padding: 5px; 
        }
        .home-icon-wrapper {
            width: 23%; display: flex; flex-direction: column; align-items: center; cursor: pointer;
        }
        .icon-box { 
            width: 45px; height: 45px; background: linear-gradient(to bottom, #444, #1a1a1a); 
            border-radius: 8px; border: 1px solid #555; display: flex; align-items: center; 
            justify-content: center; margin-bottom: 5px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.6);
        }
        .icon-box svg { width: 70%; height: 70%; }
        .icon-label { font-size: 8px; color: #eee; text-align: center; font-weight: bold; line-height: 1.1; pointer-events: none; }
    </style>
</head>
<body>

<div class="cdu-frame">
    <div class="touch-display">
        
        <div class="header-grid">
            <div class="header-box" style="padding:0; gap:0;">
                <div style="flex:1; width:100%; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="switchMode('AUDIO'); switchAudioTab('COM');">
                    <div class="header-label" style="line-height:1.2;">Audio &<br>Radios</div>
                </div>
                <div style="width:80%; height:1px; background:#333;"></div>
                <div style="flex:1; width:100%; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="switchMode('INTERCOM')">
                    <div class="header-label">Intercom</div>
                </div>
            </div>

            <div class="header-box">
                <div class="header-label">COM1</div>
                <div class="freq-act" id="h-com1-act">133.30</div>
                <div class="swap-arrow" onclick="swapFreq('com1')">↕</div>
                <div class="freq-stby" id="h-com1-stb">121.90</div>
            </div>
            
            <div class="header-box">
                <div class="header-label" style="margin-bottom:2px;">MIC</div>
                <div class="green-ind" id="top-mic-val">COM1</div>
                <div class="header-label" style="margin-top:2px; margin-bottom:2px;">MON</div>
                <div class="green-ind" id="top-mon-val">1/2</div>
            </div>
            
            <div class="header-box">
                <div class="header-label">COM2</div>
                <div class="freq-act" id="h-com2-act">128.20</div>
                <div class="swap-arrow" onclick="swapFreq('com2')">↕</div>
                <div class="freq-stby" id="h-com2-stb">118.20</div>
            </div>
            
            <div class="header-box" style="padding:0; gap:0;">
                <div style="flex:1; width:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;" onclick="switchMode('XPDR_MODE')">
                    <div class="header-label" style="color:var(--text-cyan); margin-bottom:1px;">XPDR2</div>
                    <div class="green-ind" id="top-xpdr-mode">AUTO</div>
                </div>
                <div style="width:80%; height:1px; background:#333;"></div>
                <div style="flex:1; width:100%; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="switchMode('XPDR_CODE')">
                    <div class="freq-act" id="top-xpdr-code" style="color:var(--text-green); font-size:12px;">1234</div>
                </div>
            </div>
        </div>

        <div class="mode-title-bar" id="modeTitle">Home</div>
        <div id="mainContentArea"></div>
        <div class="footer-nav" id="footerNav"></div>
        
        <div class="status-footer">
            <div style="text-align:left;">- Range +<br>Push:Pan</div>
            <div id="center-label">CDU HOME</div>
            <div style="text-align:right;">COM1 FREQ<br>Hold:↕</div>
        </div>
    </div>
</div>

<script>
    // --- State Variables ---
    let currentMode = 'HOME';
    let audioTab = 'COM'; 
    let inputTarget = 'com1';
    
    // Numpad 입력 상태 관리 (타이핑 시작 여부)
    let currentInput = "";
    let xpdrInput = "";
    let hasStartedTyping = false; 
    
    // Audio State
    let micSelected = 'COM1'; 
    let monStates = { 
        com1: true, com2: true, uvhf: false, vhffm: true, hf: false, selcal: false,
        nav1: true, nav2: true, speaker: true 
    };
    let clicksState = 'Off'; 
    
    // Intercom State
    let icStates = { 
        CoPilot: true, Pilot: true, Crew1: true, Pass: true, Crew2: true, wICS: true, 
        Isolate: false, Loop1: false, Loop2: false, Loop5: false 
    };
    let voxState = 'Off';
    let volumes = { 
        com1: 100, com2: 75, uvhf: 90, pb: 100, intercom: 100, 
        vhffm: 100, hf: 100, clicks: 100, nav1: 100, nav2: 100, speaker: 100 
    };
    
    // Frequencies, XPDR & HF States
    let freqs = { 
        com1: { act: "124.380", stb: "129.990" }, 
        com2: { act: "119.340", stb: "132.110" }, 
        uvhf: { act: "115.000", stb: "110.000" },
        hf: { act: "7.5423", stb: "11.4570" },
        nav1: { act: "117.80", stb: "113.00", id: "TOP" },
        nav2: { act: "115.50", stb: "113.25", id: "STJ" }
    };
    
    let xpdrState = { mode: 'Auto', code: '1234', active: 'XPDR2', adsb: true, flightId: 'TERRY' };
    let hfState = { tuning: 'Simplex', emission: 'LSB V', sql: 'SQ3', pwr: 'High' };

    // --- High-fidelity SVG Icons for Home Screen ---
    const homeButtons = [
        { id: 'mapSettings', text: 'Map<br>Settings', icon: '<svg viewBox="0 0 100 100"><rect x="15" y="25" width="70" height="50" fill="#4caf50" rx="3"/><path d="M30 75 L50 25 L70 75" fill="#81c784"/><circle cx="50" cy="50" r="15" fill="none" stroke="#fff" stroke-width="4"/><line x1="20" y1="20" x2="45" y2="45" stroke="#ccc" stroke-width="8" stroke-linecap="round"/></svg>' },
        { id: 'traffic', text: 'Traffic', icon: '<svg viewBox="0 0 100 100"><polygon points="30,30 40,50 20,50" fill="#0ff"/><polygon points="70,50 80,70 60,70" fill="#fff"/><line x1="30" y1="20" x2="30" y2="10" stroke="#0ff" stroke-width="4"/><polygon points="25,15 30,5 35,15" fill="#0ff"/><line x1="70" y1="80" x2="70" y2="90" stroke="#fff" stroke-width="4"/><polygon points="65,85 70,95 75,85" fill="#fff"/></svg>' },
        { id: 'connextWeather', text: 'Connext<br>Weather', icon: '<svg viewBox="0 0 100 100"><circle cx="40" cy="40" r="20" fill="#ffeb3b"/><circle cx="65" cy="50" r="15" fill="#fff"/><circle cx="45" cy="55" r="15" fill="#fff"/><circle cx="80" cy="55" r="15" fill="#fff"/><rect x="45" y="40" width="35" height="30" fill="#fff" rx="10"/><path d="M60 65 L45 85 L55 85 L50 100" stroke="#f44336" stroke-width="4" fill="none"/></svg>' },
        { id: 'terrainProximity', text: 'Terrain<br>Proximity', icon: '<svg viewBox="0 0 100 100"><polygon points="10,90 50,20 90,90" fill="#4caf50"/><polygon points="30,55 50,20 70,55" fill="#ffeb3b"/><polygon points="40,37 50,20 60,37" fill="#f44336"/></svg>' },
        
        { id: 'directTo', text: 'Direct To', icon: '<svg viewBox="0 0 100 100"><path d="M35 20 L35 80 C70 80, 85 65, 85 50 C85 35, 70 20, 35 20 Z" fill="none" stroke="#fff" stroke-width="10"/><line x1="10" y1="50" x2="90" y2="50" stroke="#fff" stroke-width="8"/><polygon points="70,35 95,50 70,65" fill="#fff"/></svg>' },
        { id: 'flightPlan', text: 'Flight Plan', icon: '<svg viewBox="0 0 100 100"><path d="M20 80 L50 50 L80 80" fill="none" stroke="#fff" stroke-width="4"/><circle cx="20" cy="80" r="5" fill="#0ff"/><circle cx="50" cy="50" r="5" fill="#0ff"/><circle cx="80" cy="80" r="5" fill="#0ff"/><polygon points="50,20 65,45 35,45" fill="#fff"/></svg>' },
        { id: 'proc', text: 'PROC', icon: '<svg viewBox="0 0 100 100"><path d="M20 80 C 40 20, 80 20, 80 50" fill="none" stroke="#fff" stroke-width="6"/><polygon points="70,40 80,55 90,40" fill="#fff"/><rect x="75" y="60" width="10" height="30" fill="#f0f"/></svg>' },
        { id: 'charts', text: 'Charts', icon: '<svg viewBox="0 0 100 100"><rect x="25" y="15" width="50" height="70" fill="none" stroke="#fff" stroke-width="6" rx="5"/><line x1="15" y1="30" x2="35" y2="30" stroke="#ccc" stroke-width="4"/><line x1="15" y1="50" x2="35" y2="50" stroke="#ccc" stroke-width="4"/><line x1="15" y1="70" x2="35" y2="70" stroke="#ccc" stroke-width="4"/><circle cx="50" cy="45" r="10" fill="#0ff"/></svg>' },
        
        { id: 'aircraftSystems', text: 'Aircraft<br>Systems', icon: '<svg viewBox="0 0 100 100"><circle cx="50" cy="45" r="22" fill="none" stroke="#ccc" stroke-width="8" stroke-dasharray="12, 6"/><circle cx="50" cy="45" r="10" fill="#0ff"/><text x="50" y="90" font-size="18" text-anchor="middle" fill="#fff" font-weight="bold">Audio</text></svg>' },
        { id: 'checklist', text: 'Checklist', icon: '<svg viewBox="0 0 100 100"><rect x="25" y="15" width="50" height="70" fill="none" stroke="#fff" stroke-width="6" rx="3"/><line x1="35" y1="35" x2="65" y2="35" stroke="#fff" stroke-width="4"/><line x1="35" y1="55" x2="65" y2="55" stroke="#fff" stroke-width="4"/><line x1="35" y1="75" x2="65" y2="75" stroke="#fff" stroke-width="4"/><polyline points="15,45 30,60 60,10" fill="none" stroke="#0ff" stroke-width="8"/></svg>' },
        { id: 'services', text: 'Services', icon: '<svg viewBox="0 0 100 100"><path d="M30 50 C30 20, 70 20, 70 50" fill="none" stroke="#fff" stroke-width="8"/><rect x="25" y="50" width="10" height="20" fill="#0ff" rx="4"/><rect x="65" y="50" width="10" height="20" fill="#0ff" rx="4"/><path d="M70 70 C70 85, 45 85, 45 75" fill="none" stroke="#fff" stroke-width="6"/></svg>' },
        { id: 'utilities', text: 'Utilities', icon: '<svg viewBox="0 0 100 100"><line x1="20" y1="80" x2="70" y2="30" stroke="#ccc" stroke-width="8" stroke-linecap="round"/><circle cx="70" cy="30" r="12" fill="none" stroke="#ccc" stroke-width="6"/><line x1="20" y1="20" x2="80" y2="80" stroke="#ffeb3b" stroke-width="6"/><polygon points="20,20 30,10 40,20" fill="#ffeb3b"/></svg>' },
        
        { id: 'perf', text: 'PERF', icon: '<svg viewBox="0 0 100 100"><line x1="20" y1="10" x2="20" y2="80" stroke="#fff" stroke-width="4"/><line x1="20" y1="80" x2="90" y2="80" stroke="#fff" stroke-width="4"/><rect x="30" y="50" width="15" height="30" fill="#f0f"/><rect x="55" y="25" width="15" height="55" fill="#0ff"/></svg>' },
        { id: 'waypointInfo', text: 'Waypoint<br>Info', icon: '<svg viewBox="0 0 100 100"><polygon points="50,15 85,35 85,75 50,95 15,75 15,35" fill="none" stroke="#0ff" stroke-width="6"/><circle cx="50" cy="55" r="10" fill="#f0f"/></svg>' },
        { id: 'nearest', text: 'Nearest', icon: '<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="8" fill="#fff"/><line x1="20" y1="20" x2="40" y2="40" stroke="#f0f" stroke-width="6"/><polygon points="30,40 45,45 40,30" fill="#f0f"/><line x1="80" y1="20" x2="60" y2="40" stroke="#f0f" stroke-width="6"/><polygon points="70,40 55,45 60,30" fill="#f0f"/><line x1="20" y1="80" x2="40" y2="60" stroke="#f0f" stroke-width="6"/><polygon points="30,60 45,55 40,70" fill="#f0f"/><line x1="80" y1="80" x2="60" y2="60" stroke="#f0f" stroke-width="6"/><polygon points="70,60 55,55 60,70" fill="#f0f"/></svg>' }
    ];

    // --- Core Functions ---
    function switchMode(mode, target = 'com1') {
        currentMode = mode;
        inputTarget = target;
        
        // 탭이 COM으로 강제 초기화되는 오작동을 해결하기 위해 강제 리셋 로직 삭제
        // (대신 Audio 탭을 띄우는 홈 화면이나, 좌측 상단 버튼에 직접 switchAudioTab('COM')을 부여해 우선순위 해결)
        
        if(mode === 'COM_INPUT') {
            currentInput = freqs[inputTarget].stb.replace(/\./g, '');
            hasStartedTyping = false; 
        }
        if(mode === 'XPDR_CODE') {
            xpdrInput = xpdrState.code;
            hasStartedTyping = false;
        }
        
        renderContent();
    }

    function switchAudioTab(tab) {
        audioTab = tab;
        renderContent();
    }

    function toggleClicks() {
        clicksState = clicksState === 'Off' ? 'On' : 'Off';
        renderContent();
    }

    function renderContent() {
        const container = document.getElementById('mainContentArea');
        const footer = document.getElementById('footerNav');
        const title = document.getElementById('modeTitle');
        const centerLabel = document.getElementById('center-label');
        container.innerHTML = '';

        if (currentMode === 'HOME') {
            title.innerText = "Home";
            centerLabel.innerText = "CDU HOME";
            
            let gridHtml = `<div class="home-grid">`;
            homeButtons.forEach(btn => {
                let clickAction = btn.id === 'aircraftSystems' ? `onclick="switchMode('AUDIO'); switchAudioTab('COM');"` : '';
                gridHtml += `
                    <div class="home-icon-wrapper" ${clickAction}>
                        <div class="icon-box">${btn.icon}</div>
                        <div class="icon-label">${btn.text}</div>
                    </div>`;
            });
            gridHtml += `</div>`;
            container.innerHTML = gridHtml;
            
            footer.innerHTML = `<div class="nav-btn"><span>✔️</span>INIT</div><div class="nav-btn" onclick="switchMode('HOME')"><span>🏠</span>Home</div><div class="nav-btn"><span>✉</span>Msg</div><div class="nav-btn" onclick="switchMode('AUDIO'); switchAudioTab('COM');"><span>✥</span>Full</div>`;
        } 
        else if (currentMode === 'AUDIO') {
            title.innerText = "Audio & Radios";
            centerLabel.innerText = `CoPilot ${audioTab === 'Mission' ? 'VHF-FM' : (audioTab === 'Other' ? 'PA' : inputTarget.toUpperCase())} Volume`;
            
            let audioContent = '';

            if (audioTab === 'COM') {
                audioContent = `
                    <div style="display:flex; justify-content:space-between; font-size:7px; color:#888; margin-bottom:5px; padding: 0 60px 0 100px;">
                        <span>Volume</span><span>Control</span>
                    </div>
                    ${renderAudioRow('COM1', 'com1')} 
                    ${renderAudioRow('COM2', 'com2')} 
                    ${renderAudioRow('U/VHF', 'uvhf')}
                    <div class="volume-row">
                        <div class="item-btn">▶<br>Playback</div>
                        <div class="wedge-slider" style="grid-column: span 2;" onpointerdown="handleVol('pb', event)">
                            <span class="wedge-text">${volumes.pb}%</span>
                            <div class="wedge-fill" style="width:${volumes.pb}%"></div>
                        </div>
                        <div style="display:flex; gap:3px;">
                            <button class="item-btn" style="width:30px; height:35px;">|◀</button>
                            <button class="item-btn" style="width:30px; height:35px;">▶|</button>
                        </div>
                    </div>
                `;
            } 
            else if (audioTab === 'NAV') {
                audioContent = `
                    <div style="display:flex; justify-content:space-between; font-size:7px; color:#ccc; margin-bottom:4px; padding: 0 70px 0 80px;">
                        <span>Volume</span><span>Control</span>
                    </div>
                    <div style="display: grid; grid-template-columns: 60px 1fr 80px; align-items: center; margin-bottom: 7px; gap: 6px;">
                        <div class="item-btn ${monStates.speaker?'on':''}" onclick="toggleMon('speaker')">Speaker<div class="status-line"></div></div>
                        <div class="wedge-slider" onpointerdown="handleVol('speaker', event)">
                            <span class="wedge-text">${volumes.speaker}%</span>
                            <div class="wedge-fill" style="width:${volumes.speaker}%"></div>
                        </div>
                        <div></div>
                    </div>

    // --- Control Logics ---
    function toggleHfTuning() { hfState.tuning = hfState.tuning === 'Simplex' ? 'Duplex' : 'Simplex'; renderContent(); }
    function toggleHfEmission() {
        const modes = ['LSB V', 'USB V', 'AM'];
        hfState.emission = modes[(modes.indexOf(hfState.emission) + 1) % modes.length]; renderContent();
    }
    function toggleHfSql() {
        const sqls = ['SQ0', 'SQ1', 'SQ2', 'SQ3'];
        hfState.sql = sqls[(sqls.indexOf(hfState.sql) + 1) % sqls.length]; renderContent();
    }
    function toggleHfPwr() {
        const pwrs = ['Low', 'Mid', 'High'];
        hfState.pwr = pwrs[(pwrs.indexOf(hfState.pwr) + 1) % pwrs.length]; renderContent();
    }

    function setXpdrMode(m) { xpdrState.mode = m; renderContent(); }
    function toggleAdsb() { xpdrState.adsb = !xpdrState.adsb; renderContent(); }
    
    // XPDR Input
    function addXpdrInput(num) {
        if (!hasStartedTyping) { xpdrInput = num; hasStartedTyping = true; }
        else if (xpdrInput.length < 4) { xpdrInput += num; }
        renderContent();
    }
    function backspaceXpdr() {
        if (!hasStartedTyping) { hasStartedTyping = true; }
        xpdrInput = xpdrInput.slice(0, -1); renderContent();
    }
    function setXpdrPreset(code) { xpdrInput = code; hasStartedTyping = true; renderContent(); }
    function flashIdent() { renderContent(); }
    function confirmXpdr() {
        if(hasStartedTyping && xpdrInput.length === 4) { xpdrState.code = xpdrInput; }
        switchMode('XPDR_MODE');
    }

    function toggleIsolate() {
        icStates.Isolate = !icStates.Isolate;
        if (icStates.Isolate) {
            icStates.CoPilot = true; icStates.Pilot = true;
            icStates.Crew1 = false; icStates.Pass = false; icStates.Crew2 = false; icStates.wICS = false;
            icStates.Loop1 = false; icStates.Loop2 = false; icStates.Loop5 = false;
        }
        renderContent();
    }

    function toggleIC(name) { 
        icStates[name] = !icStates[name]; 
        if (name === 'Loop1' && icStates.Loop1) { icStates.Crew1 = true; icStates.Crew2 = true; icStates.Isolate = false; } 
        else if (name === 'Loop2' && icStates.Loop2) { icStates.Pass = true; icStates.Isolate = false; } 
        else if (name === 'Loop5' && icStates.Loop5) {
            icStates.CoPilot = true; icStates.Pilot = true; icStates.Crew1 = true;
            icStates.Pass = true; icStates.Crew2 = true; icStates.wICS = true;
            icStates.Isolate = false;
        }
        if (['Crew1', 'Pass', 'Crew2', 'wICS'].includes(name) && icStates[name]) { icStates.Isolate = false; }
        renderContent(); 
    }

    function setMic(label) { 
        if (micSelected === label) { micSelected = 'OFF'; } else { micSelected = label; }
        renderContent(); 
    }
    function toggleMon(id) { monStates[id] = !monStates[id]; renderContent(); }

    function updateHeaderUI() {
        const topMic = document.getElementById('top-mic-val');
        if(topMic) {
            if (micSelected === 'OFF' || !micSelected) { topMic.innerText = ''; } 
            else { topMic.innerText = micSelected; }
        }
        
        let monArr = [];
        if(monStates.com1) monArr.push("1"); 
        if(monStates.com2) monArr.push("2"); 
        if(monStates.uvhf) monArr.push("M");
        let monText = monArr.length ? monArr.join('/') : 'OFF';
        if(monStates.vhffm && audioTab === 'Mission') { monText = "VHF-FM"; }

        const topMon = document.getElementById('top-mon-val');
        if(topMon) topMon.innerText = monText;

        if(document.getElementById('h-com1-act')){
            document.getElementById('h-com1-act').innerText = freqs.com1.act;
            document.getElementById('h-com1-stb').innerText = freqs.com1.stb;
            document.getElementById('h-com2-act').innerText = freqs.com2.act;
            document.getElementById('h-com2-stb').innerText = freqs.com2.stb;
        }

        const xpdrModeElem = document.getElementById('top-xpdr-mode');
        if(xpdrModeElem) {
            let shortMode = xpdrState.mode.toUpperCase();
            if(shortMode === 'ALTITUDE REPORTING') shortMode = 'ALT';
            if(shortMode === 'TA ONLY') shortMode = 'TA';
            xpdrModeElem.innerText = shortMode;
        }
        const xpdrCodeElem = document.getElementById('top-xpdr-code');
        if(xpdrCodeElem) xpdrCodeElem.innerText = xpdrState.code;
    }

    function handleVol(id, e) {
        const s = e.currentTarget;
        s.setPointerCapture(e.pointerId);
        const update = (pe) => {
            const r = s.getBoundingClientRect();
            volumes[id] = Math.round(Math.max(0, Math.min(100, (pe.clientX - r.left) / r.width * 100)));
            s.querySelector('.wedge-fill').style.width = volumes[id] + '%';
            if(s.querySelector('.wedge-text')) s.querySelector('.wedge-text').innerText = volumes[id] + '%';
        };
        update(e); s.onpointermove = update; s.onpointerup = () => s.onpointermove = null;
    }

    function swapFreq(id) { 
        if(!freqs[id]) return;
        [freqs[id].act, freqs[id].stb] = [freqs[id].stb, freqs[id].act];
        renderContent();
    }

    // --- FREQ Input Logic ---
    function addInput(num) {
        if (!hasStartedTyping) {
            currentInput = num;
            hasStartedTyping = true;
        } else if (currentInput.length < 7) {
            currentInput += num;
        }
        renderContent();
    }

    function backspaceInput() {
        if (!hasStartedTyping) {
            hasStartedTyping = true;
        }
        currentInput = currentInput.slice(0, -1);
        renderContent();
    }

    function saveInputAndReturn() {
        if (hasStartedTyping && currentInput.length >= 3) {
            let v = currentInput;
            if (inputTarget === 'hf') {
                if (!v.includes('.') && v.length > 2) v = v.slice(0, 2) + "." + v.slice(2);
            } else {
                if (!v.includes('.') && v.length > 3) v = v.slice(0, 3) + "." + v.slice(3);
            }
            freqs[inputTarget].stb = v;
        }
        let backMode = inputTarget === 'hf' ? 'HF_CONTROL' : 'AUDIO';
        switchMode(backMode, inputTarget);
    }

    function handleInputXfer() {
        saveInputAndReturn();
        swapFreq(inputTarget);
    }

    function confirmInput() { 
        saveInputAndReturn();
    }

    window.onload = () => switchMode('HOME'); 
</script>
</body>
</html>
