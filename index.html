<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Gear v2.3 - Final</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #0b0d17;
            color: #ffffff;
            font-family: "Malgun Gothic", sans-serif;
            display: flex; flex-direction: column; align-items: center; 
        }
        .main-wrapper { width: 70%; min-width: 300px; background-color: #0b0d17; padding-bottom: 50px; }
        header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1506012733851-00f465985532?q=80&w=500');
            background-size: cover; background-position: center;
            padding: 12px 15px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #ff4d4d;
        }
        header .title { font-size: 18px; font-weight: bold; }
        header .version { font-size: 11px; text-align: right; color: #ccc; }
        .section-header { color: #fce98a; font-size: 14px; font-weight: bold; padding: 12px 10px 5px 15px; }
        
        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 0 10px; }
        .triple-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; padding: 2px 10px; }
        
        .btn {
            background-color: #0c0c3a; color: white !important; text-decoration: none !important;
            text-align: center; border-radius: 6px;
            font-size: 13px; font-weight: bold; display: flex;
            align-items: center; justify-content: center; min-height: 42px;
            border: 1px solid #1e293b;
            /* 터치 시 즉각 반응하도록 설정 */
            -webkit-tap-highlight-color: transparent; 
            transition: background-color 0.05s ease, transform 0.05s ease;
        }

        /* 💡 누를 때 즉시 오렌지색(보색)으로 반전! */
        .btn:active { 
            background-color: #fca311 !important; 
            color: #0b0d17 !important;           
            transform: scale(0.96);
            border-color: #ffffff;
        }

        .btn-red { background-color: #c85341; }
        .btn-kakao { background-color: #f1e05a; color: #3c1e1e !important; }
        .btn-naver { background-color: #3eaf3f; }
        .btn-google { background-color: #6a73cf; }

        /* 하단 특수 색상 버튼들 누를 때 피드백 */
        .btn-red:active, .btn-kakao:active, .btn-naver:active, .btn-google:active {
            background-color: #ffffff !important;
            color: #000000 !important;
            transform: scale(0.96);
        }
    </style>
</head>
<body ontouchstart="">

    <div class="main-wrapper">
        <header>
            <div class="title">Flight Gear.</div>
            <div class="version">ver.2.3<br>Song Doo Ri</div>
        </header>

        <div class="section-header">하늘 정보</div>
        <div class="button-grid">
            <a href="https://www.windy.com" target="_blank" rel="noopener noreferrer" class="btn">Windy</a>
            <a href="https://aim.koca.go.kr/xNotam/index.do?type=search2&language=ko_KR" target="_blank" rel="noopener noreferrer" class="btn">NOTAM</a>
            <a href="https://skyvector.com/" target="_blank" rel="noopener noreferrer" class="btn">Sky Vector</a>
            <a href="https://www.aviationweather.gov/" target="_blank" rel="noopener noreferrer" class="btn">METAR / TAF</a>
            <a href="https://www.weather.go.kr/w/index.do" target="_blank" rel="noopener noreferrer" class="btn">날씨누리</a>
            <a href="https://lamis.koca.go.kr/main.do" target="_blank" rel="noopener noreferrer" class="btn">LAMIS(저고도)</a>
        </div>

        <div class="section-header">바다 정보</div>
        <div class="button-grid">
            <a href="http://www.khoa.go.kr/swi/main.do" target="_blank" rel="noopener noreferrer" class="btn">스마트 조석예보</a>
            <a href="https://vessel.mof.go.kr" target="_blank" rel="noopener noreferrer" class="btn">Vessels DATA</a>
            <a href="https://astro.kasi.re.kr/life/pageView/5" target="_blank" rel="noopener noreferrer" class="btn">해, 달, 월광정보</a>
            <a href="https://www.khoa.go.kr/oceanmap" target="_blank" rel="noopener noreferrer" class="btn">해양공간 종합지도</a>
        </div>

        <div class="section-header">항공관련 웹사이트</div>
        <div class="button-grid">
            <a href="https://www.araib.go.kr" target="_blank" rel="noopener noreferrer" class="btn">항공사고조사</a>
            <a href="https://www.kotsa.or.kr" target="_blank" rel="noopener noreferrer" class="btn">교통안전공단</a>
            <a href="http://www.airsafety.or.kr" target="_blank" rel="noopener noreferrer" class="btn">항공자율보고</a>
            <a href="https://www.ubikais.go.kr" target="_blank" rel="noopener noreferrer" class="btn">UBIKAIS</a>
        </div>

        <div class="section-header">CCTV</div>
        <div class="button-grid">
            <a href="https://www.its.go.kr/visual/cctv" target="_blank" rel="noopener noreferrer" class="btn">울릉도, 독도</a>
            <a href="https://www.knps.or.kr/portal/main/contents/search/cctv.do" target="_blank" rel="noopener noreferrer" class="btn">한라산</a>
            <a href="https://weather.kma.go.kr/w/special/cctv.do" target="_blank" rel="noopener noreferrer" class="btn">국립공원</a>
            <a href="http://www.khoa.go.kr/pcctv" target="_blank" rel="noopener noreferrer" class="btn">항구(바다날씨)</a>
        </div>

        <div class="section-header">유관기관 참고 웹사이트</div>
        <div class="triple-grid">
            <a href="https://m.map.kakao.com" target="_blank" rel="noopener noreferrer" class="btn btn-red">위치기반</a>
            <a href="https://www.forest.go.kr/kfsweb/kfs/subIdx/Index.do" target="_blank" rel="noopener noreferrer" class="btn btn-red">실시간산불</a>
            <a href="https://www.e-gen.or.kr/egen/main.do" target="_blank" rel="noopener noreferrer" class="btn btn-red">실시간응급</a>
        </div>

        <div class="section-header">위치 정보</div>
        <div class="triple-grid">
            <a href="https://map.kakao.com" target="_blank" rel="noopener noreferrer" class="btn btn-kakao">KAKAO</a>
            <a href="https://map.naver.com" target="_blank" rel="noopener noreferrer" class="btn btn-naver">NAVER</a>
            <a href="https://www.google.co.kr/maps" target="_blank" rel="noopener noreferrer" class="btn btn-google">Google</a>
        </div>
    </div>
</body>
</html>
